name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Harden PATH so arbitrary writable directories can't shadow known tools.
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      has_npm_token: ${{ steps.meta.outputs.has_npm_token }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute release metadata
        id: meta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          if [ -n "$NPM_TOKEN" ]; then
            HAS_NPM_TOKEN=true
          else
            HAS_NPM_TOKEN=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "has_npm_token=$HAS_NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry exists
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            exit 1
          fi

      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm install --no-audit --no-fund

      - name: Lockfile in sync with package.json
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm run check:lockfile

      - name: Audit production dependencies
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm run audit:prod

      - name: Type-check
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm run lint

      - name: Run tests
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm run test:run

      - name: Dry-run publish (validates tarball + registry auth)
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run

      - name: Pack tarball for verification
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        run: npm pack

      - name: Verify tarball contents
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        shell: bash
        run: |
          TARBALL=$(ls pi-free-*.tgz)
          node scripts/check-tarball.mjs "$TARBALL"

      - name: Smoke-load source entry
        if: >-
          steps.meta.outputs.should_release == 'true' &&
          steps.meta.outputs.has_npm_token == 'true'
        shell: bash
        run: |
          ENTRY=$(node -p "require('./package.json').pi.extensions[0]")
          echo "Loading entry: $ENTRY"
          node --import tsx "$ENTRY"

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create and push tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$TAG"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com"
          REMOTE="$REMOTE/${GITHUB_REPOSITORY}.git"
          git push "$REMOTE" "$TAG"

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: >-
          node scripts/changelog-extract.mjs "$VERSION" --summary
          -o "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "$TAG" --title "$TAG"
          --notes-file "$RUNNER_TEMP/release-notes.md"

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: >-
      needs.prepare.outputs.should_release == 'true' &&
      needs.prepare.outputs.has_npm_token == 'true'
    permissions:
      contents: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
